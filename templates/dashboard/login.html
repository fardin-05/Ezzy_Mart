<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Crystal Deep Green Gradient Base */
            background: linear-gradient(135deg, #061c14, #0b2e21, #164e3b);
            font-family: 'Segoe UI', sans-serif;
            position: relative;
            overflow: hidden;
        }

        /* Ambient Crystal Glow Objects for Realism */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: rgba(46, 204, 113, 0.15);
            filter: blur(80px);
            z-index: 1;
        }
        body::before { top: 10%; left: 15%; }
        body::after { bottom: 10%; right: 15%; }

        .card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            /* Crystal Tinted Border */
            border: 1px solid rgba(46, 204, 113, 0.25);
            border-radius: 24px;
            padding: 50px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            z-index: 2;
        }

        .card h2 {
            text-align: center;
            color: #ffffff;
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .card p {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 35px;
            font-size: 14px;
        }

        .form-group { margin-bottom: 22px; }

        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.85);
            font-size: 13px;
            margin-bottom: 8px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(46, 204, 113, 0.2);
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .form-group input::placeholder { color: rgba(255, 255, 255, 0.3); }

        .form-group input:focus {
            border-color: #2ecc71;
            background: rgba(0, 0, 0, 0.35);
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.25);
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            /* Mint / Emerald Crystal Texture */
            color: #061c14;
            background: linear-gradient(135deg, #58d68d, #2ecc71);
            box-shadow: 0 8px 24px rgba(46, 204, 113, 0.3), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.5px;
        }

        .btn-login:hover {
            background: linear-gradient(135deg, #62e297, #27ae60);
            box-shadow: 0 12px 30px rgba(46, 204, 113, 0.45), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        .btn-login:active { transform: translateY(0px); }

        .error {
            background: rgba(231, 76, 60, 0.15);
            border: 1px solid rgba(231, 76, 60, 0.3);
            border-radius: 10px;
            padding: 12px 16px;
            color: #ff9999;
            font-size: 13px;
            margin-bottom: 20px;
            text-align: center;
            backdrop-filter: blur(5px);
        }

        .store-link {
            text-align: center;
            margin-top: 25px;
        }

        .store-link a {
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            text-decoration: none;
            transition: all 0.2s;
            display: inline-block;
        }

        .store-link a:hover { 
            color: #58d68d;
            transform: translateX(-3px);
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>👋 Welcome Back</h2>
        <p>Admin Dashboard — Sign in</p>

        <!-- Django messages framework দিয়ে error দেখাবে -->
        {% if messages %}
            {% for message in messages %}
                <div class="error">❌ {{ message }}</div>
            {% endfor %}
        {% endif %}

        <!-- action নেই — same URL এ POST করবে -->
        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label for="id_email">Email</label>
                <input
                    type="email"
                    name="email"
                    id="id_email"
                    placeholder="Enter admin email"
                    value="{{ request.POST.email }}"
                    autofocus
                    required
                >
            </div>

            <div class="form-group">
                <label for="id_password">Password</label>
                <input
                    type="password"
                    name="password"
                    id="id_password"
                    placeholder="Enter your password"
                    required
                >
            </div>

            <button type="submit" class="btn-login">Sign In →</button>
        </form>

        <div class="store-link">
            <a href="{% url 'store_home' %}">← Go to Store</a>
        </div>
    </div>
</body>
</html>
